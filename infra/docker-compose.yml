version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: ts_postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: ts_projetos_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ts_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  pgdata:
